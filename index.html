<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airy Premium Landing Page</title>
    <meta name="description" content="A modern, airy landing page with glassmorphism and pastel gradients.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Decorative Shapes -->
    <div class="shape shape-1" aria-hidden="true"></div>
    <div class="shape shape-2" aria-hidden="true"></div>

    <main class="container">
        <section class="hero-glass">
            <h1>빛과 공기로 태어난 디자인</h1>
            <p>우리는 당신의 상상을 부드러운 빛과 투명한 공기 속에 담아냅니다. 여백의 미학과 글래스모피즘이 만나는 새로운 감각의 경험을 시작해보세요.</p>
            
            <div class="button-group">
                <button id="cta-button-1" class="glass-btn">지금 시작하기</button>
                <button id="cta-button-2" class="glass-btn">더 알아보기</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
