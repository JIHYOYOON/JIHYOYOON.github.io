<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jihyo Profile - Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="profile-view">
    <div id="sparkle-container"></div>

    <!-- Pebble Decorations -->
    <div class="pebble pebble-1"></div>
    <div class="pebble pebble-2"></div>
    <div class="pebble pebble-3"></div>

    <!-- Back Button -->
    <div class="back-btn-wrapper">
        <a href="index.html" class="back-btn">Back</a>
    </div>

    <!-- Main Profile Card -->
    <main class="profile-card">
        <div class="profile-img-frame">
            <img src="assets/balloon_dog.png" alt="Profile Icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
        </div>

        <h1 class="profile-name">jihyo</h1>

        <ul class="profile-info-list">
            <li><span>취미</span> <span>웹 서핑 & 코딩</span></li>
            <li><span>꿈</span> <span>창의적인 디벨로퍼</span></li>
            <li><span>좋아하는 것</span> <span>투명한 유리 디자인</span></li>
            <li><span>기술</span> <span>HTML, CSS, JS</span></li>
        </ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
