<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOON JIHYO - Hexagon Pearl</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .b1 { top: 20%; left: 25%; animation-delay: 0s; }
        .b2 { bottom: 20%; right: 25%; animation-delay: 2s; }
        .floating-text {
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: #1a2a3a;
        }
    </style>
</head>
<body class="pearl-ocean-view">
    <div class="pearl-shimmer"></div>
    <div id="bead-container"></div>
    <div class="back-btn-wrapper"><a href="index.html" class="back-btn">Back</a></div>

    <!-- Floating Butterflies -->
    <div class="butterfly b1">🦋</div>
    <div class="butterfly b2">🦋</div>

    <main class="hexagon-card">
        <h1 class="glass-text-3d">YOON JIHYO</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">(YJH)</p>
        
        <div class="info-list-modern" style="background: transparent;">
            <li class="info-item" style="background: transparent;">
                <span class="info-label floating-text">생년월일</span>
                <span class="info-value floating-text">2014년 12월 24일 (말띠)</span>
            </li>
            <li class="info-item" style="background: transparent;">
                <span class="info-label floating-text">MBTI</span>
                <span class="info-value floating-text">INFJ (창의적인 예술가)</span>
            </li>
        </div>

        <div class="glass-snowflake">❄️</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
