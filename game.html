<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tests</title>
    <!-- 나눔스퀘어라운드 폰트 적용 -->
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'NanumSquareRound', sans-serif;
            overflow: hidden;
            position: relative;
            transition: background-color 0s;
        }

        .bg-curves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 3rem 4rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.15);
            transition: opacity 0.5s ease;
            max-width: 800px; /* 메인 화면 분할을 위해 조금 늘림 */
        }

        .hidden {
            display: none !important;
        }

        .title {
            font-size: 5rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 10px rgba(135, 206, 235, 0.8), 
                         0 0 20px rgba(135, 206, 235, 0.6), 
                         0 0 40px rgba(135, 206, 235, 0.4);
            margin-top: 0;
            margin-bottom: 3rem;
            text-align: center;
            letter-spacing: 5px;
        }

        .sub-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(135, 206, 235, 0.6), 0 0 20px rgba(135, 206, 235, 0.3);
            margin-top: 0;
            margin-bottom: 2rem;
            text-align: center;
        }

        .best-score-display {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 50px;
            min-width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.15);
            font-size: 1.5rem;
            font-weight: 800;
            color: #87CEEB;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            margin-bottom: 1rem;
        }

        .game-mode-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            width: 100%;
        }

        .difficulty-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .glass-btn {
            background-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            color: rgba(135, 206, 235, 0.9);
            border: 2px solid rgba(135, 206, 235, 0.5);
            padding: 1rem 3.5rem;
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'NanumSquareRound', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(135, 206, 235, 0.1);
            margin-top: 1rem;
            white-space: nowrap;
        }

        .glass-btn:hover {
            background-color: rgba(255, 255, 255, 0.6);
            color: #87CEEB;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.3);
            border-color: rgba(135, 206, 235, 0.8);
        }
        
        .glass-btn:active {
            transform: translateY(1px);
        }

        .glass-input {
            background-color: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(135, 206, 235, 0.5);
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1.5rem;
            color: #4682B4;
            font-family: 'NanumSquareRound', sans-serif;
            font-weight: 800;
            outline: none;
            text-align: center;
            box-shadow: 0 4px 10px rgba(135, 206, 235, 0.1);
            transition: all 0.3s ease;
            width: 80%;
            max-width: 400px;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .glass-input::placeholder {
            color: rgba(135, 206, 235, 0.6);
        }

        .glass-input:focus {
            background-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.3);
            border-color: rgba(135, 206, 235, 1);
        }

        .instruction-box {
            text-align: left;
            margin-bottom: 2rem;
            color: #4682B4;
        }

        .instruction-box p {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 1rem;
            word-break: keep-all;
        }

        .highlight {
            color: #87CEEB;
            font-weight: 800;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 0 0.5rem;
            border-radius: 5px;
        }

        /* 공통 게임 영역 및 텍스트 */
        .game-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .color-test-area {
            cursor: pointer;
            background: transparent;
        }
        
        .number-test-area {
            background: rgba(255,255,255,0.85); /* 숫자 게임은 흰 배경 블러 처리 위에서 */
            backdrop-filter: blur(10px);
        }

        .game-status-text {
            font-size: 4rem;
            font-weight: 800;
            color: #AED3E3; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 1), 2px 2px 5px rgba(0, 0, 0, 0.1); 
            user-select: none;
            pointer-events: none;
        }
        
        .game-round {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(70, 130, 180, 0.8);
            margin-bottom: 2rem;
            pointer-events: none;
        }

        /* 숫자 메모리 전용 요소들 */
        .number-display-text {
            font-size: 5rem;
            letter-spacing: 5px;
            font-weight: 800;
            color: #4682B4;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            margin-bottom: 2rem;
        }
        .timer-label {
            font-size: 2rem;
            color: #ff6b6b;
            font-weight: 900;
        }

        /* 랭킹 보드 전용 스타일 */
        .ranking-container {
            width: 100%;
            min-width: 350px;
            max-width: 500px;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            font-weight: 700;
            color: #4682B4;
            transition: background 0.2s;
            border-radius: 5px;
        }

        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .ranking-item:last-child {
            border-bottom: none;
        }

        .ranking-rank { font-weight: 800; color: #87CEEB; width: 45px; }
        .ranking-name { flex-grow: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 15px;}
        .ranking-time { font-weight: 800; color: #AED3E3; text-shadow: 0 0 5px rgba(255, 255, 255, 1); }
        .my-score { background-color: rgba(135, 206, 235, 0.2); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(135, 206, 235, 0.6); border-radius: 10px; }
    </style>
</head>

<body>
    <!-- 배경 은색/하늘색 곡선 -->
    <svg class="bg-curves" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <path d="M0,300 C300,100 700,500 1000,300" fill="none" stroke="rgba(135,206,235,0.4)" stroke-width="3"/>
        <path d="M0,700 C500,1100 500,300 1000,700" fill="none" stroke="rgba(135,206,235,0.3)" stroke-width="4"/>
        <path d="M0,200 C500,-100 500,800 1000,200" fill="none" stroke="rgba(135,206,235,0.4)" stroke-width="2"/>
        <path d="M0,500 C400,800 600,200 1000,500" fill="none" stroke="rgba(192,192,192,0.4)" stroke-width="2"/>
        <path d="M0,900 C300,700 700,1100 1000,900" fill="none" stroke="rgba(192,192,192,0.3)" stroke-width="3"/>
        <path d="M0,100 C400,400 800,-100 1000,100" fill="none" stroke="rgba(192,192,192,0.3)" stroke-width="2"/>
    </svg>

    <!-- 1. 메인 화면 -->
    <div id="view-main" class="glass-panel">
        <h1 class="title" style="margin-bottom: 2rem;">BRAIN TESTS</h1>
        
        <div class="game-mode-container">
            <!-- 기존 순발력 게임 -->
            <div class="difficulty-wrapper">
                <h2 class="sub-title" style="font-size:1.8rem;">COLOR TRACING</h2>
                <div class="best-score-display" id="best-score-color">최고 기록: 없음</div>
                <button class="glass-btn game-start-btn" data-game="color">순발력 테스트</button>
            </div>

            <!-- 신규 숫자 기억력 게임 -->
            <div class="difficulty-wrapper">
                <h2 class="sub-title" style="font-size:1.8rem;">NUMBER MEMORY</h2>
                <div class="best-score-display" id="best-score-number">최고 기록: 없음</div>
                <button class="glass-btn game-start-btn" data-game="number">기억력 테스트</button>
            </div>
        </div>
    </div>

    <!-- 2. 공통 닉네임 입력 화면 -->
    <div id="view-nickname" class="glass-panel hidden">
        <h2 class="sub-title">닉네임 입력</h2>
        <input type="text" id="nickname-input" class="glass-input" placeholder="이름을 알려주세요!" autocomplete="off" maxlength="10">
        <button class="glass-btn" id="nickname-next-btn">확인</button>
    </div>

    <!-- 3. 게임 방법 안내 화면 (선택된 게임에 따라 텍스트 동적교체) -->
    <div id="view-instructions" class="glass-panel hidden">
        <h2 class="sub-title" id="inst-title">게임 방법</h2>
        <div class="instruction-box" id="inst-content">
            <!-- 텍스트 주입 -->
        </div>
        <button class="glass-btn" id="instructions-next-btn">이해했습니다</button>
    </div>

    <!-- 4. 순발력 게임 전용 영역 -->
    <div id="view-game-color" class="game-canvas color-test-area hidden">
        <div class="game-round" id="color-round-text">ROUND 1 / 4</div>
        <div class="game-status-text" id="color-status-text">클릭하여 시작 대기...</div>
    </div>

    <!-- 5. 숫자 기억력 게임 전용 영역 -->
    <div id="view-game-number" class="game-canvas number-test-area hidden">
        <div class="game-round" id="number-round-text">ROUND 1 / 10</div>
        
        <!-- 숫자 보여주기 페이즈 -->
        <div id="number-show-phase" style="display:flex; flex-direction:column; align-items:center;">
            <div class="number-display-text" id="number-display">4 8 2</div>
            <div class="timer-label" id="number-timer">남은 시간: 6초</div>
        </div>
        
        <!-- 정답 입력 페이즈 -->
        <div id="number-input-phase" class="hidden" style="display:flex; flex-direction:column; align-items:center;">
            <h2 class="sub-title" style="color:#4682B4; text-shadow:none;">기억한 숫자를 연속해서 적어주세요.</h2>
            <input type="tel" id="number-guess-input" class="glass-input" placeholder="ex) 482" autocomplete="off">
            <button class="glass-btn" id="number-submit-btn">제출하기</button>
        </div>
    </div>

    <!-- 6. 공통 최종 게임 결과 화면 -->
    <div id="view-final" class="glass-panel hidden">
        <h2 class="sub-title" id="final-title">테스트 결과</h2>
        <h3 id="final-score-text" style="color:#4682B4; font-size:1.8rem; margin-bottom: 2rem; word-break:keep-all; line-height: 1.5;">여기에 결과가 나옵니다.</h3>
        <button class="glass-btn" id="go-ranking-btn">기록 등록 및 랭킹 확인</button>
    </div>

    <!-- 7. 공통 랭킹 보드 화면 -->
    <div id="view-ranking" class="glass-panel hidden">
        <h2 class="sub-title" id="ranking-title">명예의 전당 (Top 20)</h2>
        <div class="ranking-container" id="ranking-list">
            <!-- JS로 랭킹 렌더링 -->
        </div>
        <button class="glass-btn" id="ranking-home-btn">메인 화면으로 가기</button>
    </div>

    <script>
        // --- 전역 시스템 단위 상태 ---
        let playerName = '';
        let activeGameId = ''; // 'color' or 'number'
        
        let rankingsColor = JSON.parse(localStorage.getItem('colorTracingRankings')) || [];
        let rankingsNumber = JSON.parse(localStorage.getItem('numberMemoryRankings')) || [];

        // --- 컬러(순발력) 전용 변수 ---
        let colorRound = 1;
        const colorMaxRounds = 4;
        let reactionTimes = [];
        let waitTimer = null;
        let startTime = 0;
        let colorState = 'idle';

        // --- 숫자(기억력) 전용 변수 ---
        let numberRound = 1;
        let maxNumberRound = 10;
        let currentNumberArr = [];
        let numberCountdownTimer = null;

        // --- DOM 매핑 ---
        const views = {
            main: document.getElementById('view-main'),
            nickname: document.getElementById('view-nickname'),
            instructions: document.getElementById('view-instructions'),
            gameColor: document.getElementById('view-game-color'),
            gameNumber: document.getElementById('view-game-number'),
            final: document.getElementById('view-final'),
            ranking: document.getElementById('view-ranking')
        };
        
        function showView(viewName) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
        }

        // --- 최고 기록 업데이트 (메인뷰) ---
        function updateMainBestScores() {
            const bColor = document.getElementById('best-score-color');
            const bNum = document.getElementById('best-score-number');
            
            if (rankingsColor.length > 0) {
                bColor.innerHTML = `최고 기록: <span style="color:white;">${Math.round(rankingsColor[0].score)} ms</span>`;
            } else { bColor.textContent = "최고 기록: 없음"; }

            if (rankingsNumber.length > 0) {
                bNum.innerHTML = `최고 기록: <span style="color:white;">${rankingsNumber[0].score} 단계</span>`;
            } else { bNum.textContent = "최고 기록: 없음"; }
        }
        updateMainBestScores();

        // --- 공통 시작 버튼 로직 ---
        document.querySelectorAll('.game-start-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeGameId = e.target.dataset.game;
                showView('nickname');
                document.getElementById('nickname-input').focus();
            });
        });

        document.getElementById('nickname-next-btn').addEventListener('click', () => {
            const input = document.getElementById('nickname-input').value.trim();
            playerName = input.length > 0 ? input : '익명 플레이어';
            prepareInstructions();
        });

        document.getElementById('nickname-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('nickname-next-btn').click();
        });

        function prepareInstructions() {
            const instTitle = document.getElementById('inst-title');
            const instContent = document.getElementById('inst-content');
            
            if (activeGameId === 'color') {
                instTitle.textContent = "순발력 테스트 방법";
                instContent.innerHTML = `
                    <p>1. 화면이 <span class="highlight">하늘색 바탕</span>으로 바뀔 때, <strong>재빨리 화면을 클릭</strong>하세요.</p>
                    <p>2. 테스트는 총 4번 진행되며, 클릭을 빨리 할수록 높은 평가를 받습니다.</p>
                    <p>3. 종합 반응 속도를 바탕으로 순발력이 판정됩니다.</p>
                `;
            } else if (activeGameId === 'number') {
                instTitle.textContent = "기억력 테스트 방법";
                instContent.innerHTML = `
                    <p>1. 화면에 나오는 랜덤 숫자들을 <span class="highlight">6초 동안</span> 전부 암기하세요.</p>
                    <p>2. 6초가 지난 후 빈 칸에 기억하신 숫자를 띄어쓰기 없이 연속으로 적어주세요.</p>
                    <p>3. 10라운드까지 존재하며, 틀린 답안 제출 시 그 즉시 <strong style="color:#ff6b6b">게임 오버</strong> 처리됩니다.</p>
                `;
            }
            showView('instructions');
        }

        document.getElementById('instructions-next-btn').addEventListener('click', () => {
            if (activeGameId === 'color') startColorGame();
            else if (activeGameId === 'number') startNumberGame();
        });

        // ============================================
        // 게임 1: 컬러 트레이싱 (순발력 테스트)
        // ============================================
        const colorStatusText = document.getElementById('color-status-text');
        const colorRoundText = document.getElementById('color-round-text');

        function startColorGame() {
            reactionTimes = [];
            colorRound = 1;
            showView('gameColor');
            nextColorRound();
        }

        function nextColorRound() {
            colorState = 'waiting';
            document.body.style.backgroundColor = '#ffffff';
            colorRoundText.textContent = `ROUND ${colorRound} / ${colorMaxRounds}`;
            colorStatusText.style.color = '';
            colorStatusText.textContent = "침착하게 기다리세요...";
            
            let waitTime = Math.random() * 4000 + 2500;
            waitTimer = setTimeout(() => {
                colorState = 'ready';
                document.body.style.backgroundColor = '#CEEBFC';
                colorStatusText.style.color = '#ffffff'; 
                colorStatusText.textContent = "지금!!";
                startTime = Date.now();
            }, waitTime);
        }

        views.gameColor.addEventListener('mousedown', () => {
            if (colorState === 'idle') return;

            if (colorState === 'waiting') {
                clearTimeout(waitTimer);
                colorStatusText.style.color = '#ff6b6b';
                colorStatusText.textContent = "너무 빨리 눌렀습니다!";
                document.body.style.backgroundColor = '#ffe5e5';
                colorState = 'idle';
                setTimeout(() => {
                    document.body.style.backgroundColor = '#ffffff';
                    colorStatusText.style.color = '';
                    nextColorRound();
                }, 1500);

            } else if (colorState === 'ready') {
                const rt = Date.now() - startTime;
                reactionTimes.push(rt);
                colorState = 'idle';
                colorStatusText.textContent = `${rt} ms!`;
                
                setTimeout(() => {
                    document.body.style.backgroundColor = '#ffffff';
                    colorStatusText.style.color = '';
                    if (colorRound < colorMaxRounds) {
                        colorRound++;
                        nextColorRound();
                    } else {
                        calculateColorResult();
                    }
                }, 1500);
            }
        });

        // ============================================
        // 게임 2: 숫자 암기 (기억력 테스트)
        // ============================================
        const numDisplay = document.getElementById('number-display');
        const numTimerLabel = document.getElementById('number-timer');
        const numShowPhase = document.getElementById('number-show-phase');
        const numInputPhase = document.getElementById('number-input-phase');
        const numGuessInput = document.getElementById('number-guess-input');
        const numRoundText = document.getElementById('number-round-text');

        function startNumberGame() {
            numberRound = 1;
            showView('gameNumber');
            nextNumberRound();
        }

        function nextNumberRound() {
            // 이번 라운드의 숫자 갯수 (2자리부터 시작해서 +2개씩)
            let digitCount = numberRound * 2;
            currentNumberArr = Array.from({length: digitCount}, () => Math.floor(Math.random() * 10));
            
            numRoundText.textContent = `ROUND ${numberRound} / ${maxNumberRound}`;
            
            // 띄어쓰기로 보여줌
            numDisplay.textContent = currentNumberArr.join(' ');
            
            // UI 교체
            numInputPhase.classList.add('hidden');
            numShowPhase.classList.remove('hidden');
            numShowPhase.style.display = 'flex'; // hidden class 해제 후 flex 복구
            numGuessInput.value = '';

            let timeLeft = 6;
            numTimerLabel.textContent = `남은 시간: ${timeLeft}초`;
            
            numberCountdownTimer = setInterval(() => {
                timeLeft--;
                numTimerLabel.textContent = `남은 시간: ${timeLeft}초`;
                if (timeLeft <= 0) {
                    clearInterval(numberCountdownTimer);
                    requestNumberInput();
                }
            }, 1000);
        }

        function requestNumberInput() {
            numShowPhase.style.display = 'none';
            numShowPhase.classList.add('hidden');
            
            numInputPhase.classList.remove('hidden');
            numInputPhase.style.display = 'flex';
            numGuessInput.focus();
        }

        // 엔터키 지원
        numGuessInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('number-submit-btn').click();
        });

        document.getElementById('number-submit-btn').addEventListener('click', () => {
            const guess = numGuessInput.value.replace(/\s/g, ''); // 공백제거
            const target = currentNumberArr.join('');
            
            if (guess === target) {
                // 정답!
                numGuessInput.style.borderColor = '#4CAF50'; // 초록색 임시 효과
                setTimeout(() => {
                    numGuessInput.style.borderColor = '';
                    if (numberRound < maxNumberRound) {
                        numberRound++;
                        nextNumberRound();
                    } else {
                        // 10라운드 만점자
                        calculateNumberResult(numberRound);
                    }
                }, 500);
            } else {
                // 오답 (게임 오버)
                numGuessInput.style.borderColor = '#ff6b6b';
                setTimeout(() => {
                    numGuessInput.style.borderColor = '';
                    // 이번라운드 오답이므로 (round - 1)이 최종 성공기록
                    calculateNumberResult(numberRound - 1);
                }, 1000);
            }
        });

        // ============================================
        // 공통 결과 창 처리 영역
        // ============================================
        let currentTargetScore = 0; // 공통 점수 임시변수

        function calculateColorResult() {
            const avgTime = reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length;
            currentTargetScore = avgTime;
            
            let rank = "";
            if (avgTime < 240) rank = "매우 빠름 ⚡";
            else if (avgTime < 320) rank = "빠름 🏃";
            else if (avgTime < 430) rank = "보통 🚶";
            else if (avgTime < 550) rank = "느림 🐢";
            else rank = "매우 느림 💤";

            document.getElementById('final-title').textContent = "순발력 테스트 결과";
            document.getElementById('final-score-text').innerHTML = 
                `<span class="highlight" style="padding:0 10px;">${playerName}</span> 님의 평균 반응속도는 ${Math.round(avgTime)}ms<br><br>순발력은 <strong style="font-size:2.5rem; color:#87CEEB; display:inline-block; margin-top:20px;">'${rank}'</strong> 입니다.`;
            
            showView('final');
        }

        function calculateNumberResult(achievedLevel) {
            currentTargetScore = achievedLevel;
            let rankMsg = "";
            if(achievedLevel === 10) rankMsg = "인간 알파고 🤖";
            else if (achievedLevel >= 7) rankMsg = "상위 1% 기억력 🌟";
            else if (achievedLevel >= 4) rankMsg = "준수한 기억력 🧠";
            else rankMsg = "붕어빵 기억력 🐟";

            document.getElementById('final-title').textContent = "기억력 테스트 결과";
            document.getElementById('final-score-text').innerHTML = 
                `<span class="highlight" style="padding:0 10px;">${playerName}</span> 님은 최종 <strong style="color:#ff6b6b;">${achievedLevel}단계</strong> 까지 성공했습니다!<br><br>당신의 기억력 평가는 <strong style="font-size:2.5rem; color:#87CEEB; display:inline-block; margin-top:20px;">'${rankMsg}'</strong> 입니다.`;
            
            showView('final');
        }

        // ============================================
        // 랭킹 저장 및 렌더링 로직
        // ============================================
        document.getElementById('go-ranking-btn').addEventListener('click', () => {
            // 결과창 -> 랭킹 넘어가기 버튼을 눌렀을 때 비로소 저장
            if(activeGameId === 'color') {
                rankingsColor.push({ name: playerName, score: currentTargetScore });
                rankingsColor.sort((a, b) => a.score - b.score); // 시간이 짧은 순
                if (rankingsColor.length > 20) rankingsColor = rankingsColor.slice(0, 20);
                localStorage.setItem('colorTracingRankings', JSON.stringify(rankingsColor));
            } else {
                rankingsNumber.push({ name: playerName, score: currentTargetScore });
                rankingsNumber.sort((a, b) => b.score - a.score); // 높은 단계(숫자) 순
                if (rankingsNumber.length > 20) rankingsNumber = rankingsNumber.slice(0, 20);
                localStorage.setItem('numberMemoryRankings', JSON.stringify(rankingsNumber));
            }
            
            renderRankingBoard();
            showView('ranking');
        });

        function renderRankingBoard() {
            const listEl = document.getElementById('ranking-list');
            const targetRankings = (activeGameId === 'color') ? rankingsColor : rankingsNumber;
            const unit = (activeGameId === 'color') ? 'ms' : '단계 성공';
            
            document.getElementById('ranking-title').textContent = 
                (activeGameId === 'color' ? "순발력 명예의 전당" : "기억력 명예의 전당");
                
            listEl.innerHTML = '';
            
            if (targetRankings.length === 0) {
                listEl.innerHTML = '<div class="ranking-item" style="justify-content:center;">기록이 없습니다.</div>';
                return;
            }

            targetRankings.forEach((entry, index) => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                
                // 직전 플레이 기록은 파란 바탕으로 강조
                if (entry.name === playerName && entry.score === currentTargetScore) {
                    item.classList.add('my-score');
                }

                item.innerHTML = `
                    <span class="ranking-rank">${index + 1}등</span>
                    <span class="ranking-name">${entry.name}</span>
                    <span class="ranking-time" style="color: ${activeGameId === 'color' ? '#AED3E3' : '#ff6b6b'};">${activeGameId === 'color' ? Math.round(entry.score) : entry.score} ${unit}</span>
                `;
                listEl.appendChild(item);
            });
            
            updateMainBestScores(); // 다음에 메인 갈 때를 위해 업데이트
        }

        // --- 메인으로 돌아가기 ---
        document.getElementById('ranking-home-btn').addEventListener('click', () => {
            showView('main');
            document.body.style.backgroundColor = '#ffffff';
            document.getElementById('nickname-input').value = '';
            playerName = '';
        });
    </script>
</body>

</html>
